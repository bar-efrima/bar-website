<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#070710" />
    <meta name="description" content="Bar Efrima – Full Stack Developer, AI and Systems" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <title>Bar Efrima</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #070710; }
      #site-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #070710;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        transition: opacity 0.35s ease;
      }
      #site-loader.fade-out { opacity: 0; pointer-events: none; }
      .sl-ring {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: 2.5px solid rgba(255, 255, 255, 0.08);
        border-top-color: #c84a97;
        border-right-color: #00d1ff;
        animation: sl-spin 0.85s linear infinite;
      }
      @keyframes sl-spin { to { transform: rotate(360deg); } }
      .sl-name {
        font-family: 'Poppins', system-ui, sans-serif;
        font-size: 11px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 0.3em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="site-loader" aria-label="Loading" role="status">
      <div class="sl-ring"></div>
      <span class="sl-name">Bar Efrima</span>
    </div>
    <div id="root"></div>
  </body>
</html>
